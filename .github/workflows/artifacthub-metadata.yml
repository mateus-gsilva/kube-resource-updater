name: Artifact Hub metadata

# Pushes artifacthub-repo.yml to the chart's OCI path under the special
# `artifacthub.io` tag so Artifact Hub can verify repository ownership and
# award the Verified Publisher badge. Idempotent; re-runs on metadata change.

on:
  push:
    branches: [main]
    paths:
      - artifacthub-repo.yml
      - .github/workflows/artifacthub-metadata.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  push-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oras-project/setup-oras@v1

      - name: Push metadata artifact to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | oras login ghcr.io -u ${{ github.actor }} --password-stdin
          oras push \
            ghcr.io/mateus-gsilva/charts/kube-resource-updater:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
