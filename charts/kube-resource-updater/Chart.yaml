apiVersion: v2
name: kube-resource-updater
description: Syncs Prometheus resource recommendations back to Git as ResourceOverride CRs, with an in-cluster mutation webhook that patches pod resources at admission time. Works with any GitOps engine (Argo CD, Flux, plain kubectl).
type: application
version: 0.1.2
appVersion: "0.1.2"
kubeVersion: ">= 1.27.0"
keywords:
  - prometheus
  - gitops
  - resources
  - rightsizing
  - vpa
  - admission-webhook
home: https://github.com/mateus-gsilva/kube-resource-updater
sources:
  - https://github.com/mateus-gsilva/kube-resource-updater
icon: https://raw.githubusercontent.com/mateus-gsilva/kube-resource-updater/main/assets/logo.svg
maintainers:
  - name: mateus-gsilva
    email: mateus.gsilva95@gmail.com
annotations:
  # ArtifactHub categorization. `application` is the safe default; switch
  # to `monitoring` or `analytics` if narrower categorization fits better
  # once published.
  category: application
  # Mark this as the upstream chart artifact rather than a fork.
  artifacthub.io/operator: "false"
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "false"
dependencies:
  - name: common
    version: 2.x.x
    repository: oci://registry-1.docker.io/bitnamicharts
