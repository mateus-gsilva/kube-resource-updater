## @section Mutation Webhook
##
## When enabled, the chart deploys an additional Deployment that runs the in-cluster
## mutating admission webhook. The webhook reads ResourceOverride CRs and patches
## pod resources at admission time, replacing the legacy Helm/Kustomize value-tree
## write-back. Default is disabled — opt-in cluster by cluster during migration.
##
## Same image as the CronJob; only the command differs (`python main.py webhook`).
##
webhook:
  ## @param webhook.enabled Enable the mutation webhook Deployment, Service, MutatingWebhookConfiguration, and (when validating.enabled) the ValidatingWebhookConfiguration. The webhook owns its own serving cert through an in-process reconciler — no cert-manager dependency.
  enabled: false
  ## Number of webhook replicas. Trade-offs:
  ##
  ##   replicaCount: 1  (single-runner)
  ##     - Brief admission gap during pod restart (failurePolicy: Ignore
  ##       absorbs this — pods admit with chart defaults during the gap).
  ##     - No coordination needed: cert reconciler, status writer, and
  ##       auto-rollout watcher run exactly once cluster-wide.
  ##     - Recommended for clusters that aren't latency-sensitive on
  ##       brand-new pod admission AND tolerate single-replica failure
  ##       modes (PDB blocking, node drain).
  ##
  ##   replicaCount: 2+ (HA)
  ##     - Zero admission downtime — Service load-balances to whichever
  ##       replica is up.
  ##     - Cert reconciler: idempotent (CA rotation is monotonic, both
  ##       replicas converge on the same caBundle).
  ##     - Status writer: last-write-wins on `lastAppliedAt` PATCH.
  ##       Acceptable because it's a stamp; the value is the same nanosecond
  ##       regardless of which replica reports it.
  ##     - Auto-rollout watcher: both replicas observe CR events, both
  ##       schedule a debounced restart, both PATCH `restartedAt` on the
  ##       workload's PodTemplate. The patches are idempotent (same value
  ##       within the debounce window) but you get 2× the apiserver writes.
  ##       Set `webhook.autoRollout.enabled: false` if running ≥ 2 replicas
  ##       and you want stricter rollout semantics.
  ##
  ## @param webhook.replicaCount Number of webhook replicas (1 = single-runner; ≥ 2 for HA, see trade-offs above)
  replicaCount: 1
  ## @param webhook.revisionHistoryLimit Number of old ReplicaSets to retain for rollback. 0 keeps only the current one.
  ## Default 10 (Kubernetes default). Lower values shrink the ArgoCD UI tree
  ## for clusters that get frequent webhook image bumps; 0 means no rollback
  ## history (`kubectl rollout undo` won't work, but live deploy is unaffected).
  revisionHistoryLimit: 10
  ## @param webhook.deploymentAnnotations Annotations on the webhook Deployment's own metadata (NOT the pod template — use podAnnotations for that). For controllers that read Deployment-level annotations, e.g. Stakater Reloader: `configmap.reloader.stakater.com/reload: <configmap-name>`.
  deploymentAnnotations: {}
  ## @param webhook.port TLS port the webhook listens on for AdmissionReview
  port: 9443
  ## @param webhook.metricsPort Plain-HTTP port for /healthz, /readyz, /metrics
  metricsPort: 8080
  ## @param webhook.failurePolicy Behaviour when webhook is unreachable. `Ignore` lets pods admit with chart defaults; `Fail` blocks the pod.
  failurePolicy: Ignore
  ## @param webhook.timeoutSeconds Per-request admission timeout
  timeoutSeconds: 5
  ## @param webhook.sideEffects Standard k8s admission field; `None` documents that the webhook does not affect external state
  sideEffects: None

  ## @param webhook.resources.requests CPU/memory requests for the webhook pod
  ## @param webhook.resources.limits CPU/memory limits for the webhook pod
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 256Mi

  ## TLS — handled by an in-process cert reconciler (src/webhook_cert.py).
  ## On first start, the webhook pod generates a self-signed CA + serving cert,
  ## stores them in a Secret, and patches the MutatingWebhookConfiguration's
  ## caBundle. Renewal is automatic (30 days before expiry); rotation
  ## triggers a pod restart so aiohttp picks up the new cert. No
  ## cert-manager dependency. The chart-level Secret is created on demand by
  ## the reconciler — there is no template for it here.
  ##
  ## The MWC/VWC templates intentionally do NOT render `caBundle`:
  ## omitting the field means no GitOps engine owns it via SSA, so the
  ## reconciler's injected value persists through every sync without a brief
  ## fail-open window. Set `webhook.caBundle` ONLY when using an external PKI
  ## (e.g. cert-manager ca-injector or a corporate CA) and you want the chart
  ## to own the field — then configure the in-process reconciler not to
  ## overwrite it. When set, the value is emitted into both the
  ## MutatingWebhookConfiguration and ValidatingWebhookConfiguration.
  ## @param webhook.caBundle Optional base64-encoded CA bundle for the webhook TLS cert (default empty → in-process reconciler owns it)
  caBundle: ""

  ## namespaceSelector — only excludes hard-coded system namespaces.
  ##
  ## Opt-in lives in the **annotation** `kube-resource-updater.enabled: "true"`
  ## on the Namespace. Annotations can't be used in a `LabelSelector`
  ## (k8s API limitation), so the webhook itself reads the annotation through
  ## a cached Namespace informer and short-circuits before computing any
  ## patch. The matchExpressions below cover only the unconditional excludes
  ## (release namespace, kube-system) — every other namespace's request is
  ## handled in code with negligible cost (one map lookup per admission).
  ##
  ## How to opt in: add the annotation directly to the Namespace, e.g. through
  ## ArgoCD's `managedNamespaceMetadata`:
  ##
  ##   spec:
  ##     syncPolicy:
  ##       managedNamespaceMetadata:
  ##         annotations:
  ##           kube-resource-updater.enabled: "true"
  ##
  namespaceSelector:
    matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
          - kube-system

  ## objectSelector — annotation-only opt-out. Workloads carrying
  ## `kube-resource-updater.skip: "true"` skip patching; same caveat as the
  ## namespaceSelector above (annotation read in code, not via LabelSelector).
  ## Left empty here so the webhook receives every pod in opted-in namespaces
  ## and the skip decision is centralised next to the rest of the resolver.
  objectSelector: {}

  ## Validating webhook — rejects ResourceOverride CRs whose selector
  ## could match the same pod as another CR while sharing a container
  ## name. Without it, the mutating webhook resolves the conflict
  ## silently with "last write wins" and a runtime warning; this turns
  ## that into a clear `kubectl apply` rejection at admission time.
  ##
  ## On by default — selector-overlap is a class of silent corruption
  ## you want flagged at apply time, not 6h later in a webhook log.
  ## `failurePolicy: Ignore` (hard-coded in the template) means a
  ## webhook outage can never block `kubectl apply`; the worst case is
  ## "no validation runs", same as having the chart toggle off. Audit-
  ## strict shops or clusters that don't want any extra admission
  ## webhook flip this to false.
  validating:
    ## @param webhook.validating.enabled Reject CR creates/updates whose selector + container set overlaps an existing CR in the same namespace.
    enabled: true

  ## Auto-rollout — when a ResourceOverride is created or updated and
  ## resource values actually change, restart the workloads it patches
  ## so running pods pick up the new spec without waiting for an
  ## unrelated event (release, node drain, scale).
  ##
  ## Hierarchy of opt-in (workload > namespace > helm-default):
  ##
  ##   metadata.annotations:
  ##     kube-resource-updater.autoRollout: "true|false"
  ##
  ## on a Deployment / StatefulSet wins; otherwise the Namespace
  ## annotation; otherwise this helm-default. Default off because pod
  ## restarts are visible side-effects — opt in cluster-wide here, opt
  ## out per-workload via annotation.
  ##
  ## Debounce coalesces rapid CR updates targeting the same workload —
  ## a multi-CR MR merge results in one rolling restart per affected
  ## workload, not one per CR.
  autoRollout:
    ## @param webhook.autoRollout.enabled Cluster-wide default for the auto-rollout hierarchy. Per-workload / per-namespace annotations override this.
    enabled: false
    ## @param webhook.autoRollout.debounceSeconds How long to wait after the last CR change before patching the workload's PodTemplate.
    debounceSeconds: 30

  ## Status writer — populates ResourceOverride.status.appliedToPodCount and
  ## .status.lastAppliedAt so `kubectl get ro -A` becomes a real adoption
  ## diagnostic. Coalesced over `flushIntervalSeconds` to keep apiserver
  ## load proportional to the number of CRs, not the number of pod
  ## admissions.
  ##
  ## Off by default not because the writer is risky (it isn't), but because
  ## in audit-strict environments every PATCH on `.status` becomes an audit
  ## event; opt-in keeps those clusters quiet by default. Operators who want
  ## the diagnostic flip this to true.
  status:
    ## @param webhook.status.enabled Write CR.status.appliedToPodCount + lastAppliedAt; controls the RBAC verb on resourceoverrides/status too.
    enabled: false
    ## @param webhook.status.flushIntervalSeconds Coalesce window for the status writer (seconds).
    flushIntervalSeconds: 30

  ## ServiceMonitor for the webhook's /metrics endpoint. The CronJob has no /metrics
  ## endpoint of its own, so this is webhook-specific.
  metrics:
    serviceMonitor:
      ## @param webhook.metrics.serviceMonitor.enabled Create a ServiceMonitor for /metrics
      enabled: false
      ## @param webhook.metrics.serviceMonitor.namespace Namespace for the ServiceMonitor (defaults to release namespace)
      namespace: ""
      ## @param webhook.metrics.serviceMonitor.interval Scrape interval
      interval: 30s
      ## @param webhook.metrics.serviceMonitor.labels Extra labels. Must match your Prometheus operator's serviceMonitorSelector — e.g. `release: kube-prometheus-stack` (the Helm release name of your kube-prometheus-stack install). Empty by default: with a strict selector the ServiceMonitor is silently NOT scraped until this is set.
      labels: {}
    prometheusRule:
      ## @param webhook.metrics.prometheusRule.enabled Create a PrometheusRule with webhook alerting rules (requires prometheus-operator). Pairs with serviceMonitor.enabled — alerts on the webhook failing open (failurePolicy: Ignore) so a down webhook pages instead of silently admitting pods with chart-default resources.
      enabled: false
      ## @param webhook.metrics.prometheusRule.namespace Namespace for the PrometheusRule (defaults to release namespace)
      namespace: ""
      ## @param webhook.metrics.prometheusRule.labels Extra labels for the PrometheusRule. Must match your Prometheus operator's ruleSelector — e.g. `release: kube-prometheus-stack`. Empty by default: with a strict selector the rules are silently NOT loaded until this is set.
      labels: {}

  ## @param webhook.podDisruptionBudget.enabled Create a PDB for the webhook Deployment. Default false because the chart's `webhook.replicaCount: 1` default plus a PDB with `minAvailable: 1` would block every node drain involving the webhook pod (single replica can't satisfy the budget). Operators who bump replicaCount to >= 2 should flip this to true. Chart's validate.yaml fails install when PDB is on with replicaCount=1.
  ## @param webhook.podDisruptionBudget.minAvailable Minimum number of available webhook replicas
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  ## @param webhook.nodeSelector Node selector for webhook pods
  nodeSelector: {}
  ## @param webhook.tolerations Tolerations for webhook pods
  tolerations: []
  ## @param webhook.affinity Affinity rules for webhook pods (empty = the chart applies soft anti-affinity by hostname)
  affinity: {}

