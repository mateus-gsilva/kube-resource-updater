extraEnvVars: []
## @param extraEnvVarsCM Name of ConfigMap with extra environment variables
extraEnvVarsCM: ""
## @param extraEnvVarsSecret Name of Secret with extra environment variables
extraEnvVarsSecret: ""
## @param extraVolumes Extra volumes
extraVolumes: []
## @param extraVolumeMounts Extra volume mounts
extraVolumeMounts: []
## @param initContainers Extra init containers
initContainers: []
## @param sidecars Extra sidecar containers
sidecars: []
