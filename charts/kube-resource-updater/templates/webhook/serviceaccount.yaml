{{- if .Values.webhook.enabled -}}
{{- /*
Dedicated ServiceAccount for the webhook. Separated from the CronJob's SA so the
two components can be RBAC-tightened independently:
  - CronJob needs cluster-wide read access to ArgoCD Applications + per-cluster VPAs.
  - Webhook needs only ResourceOverride list/watch + admission self-checks.
*/}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-resource-updater.webhook.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "kube-resource-updater.webhook.labels" . | nindent 4 }}
automountServiceAccountToken: true
{{- end }}
