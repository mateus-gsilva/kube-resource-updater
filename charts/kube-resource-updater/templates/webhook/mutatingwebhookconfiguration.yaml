{{- if .Values.webhook.enabled -}}
{{- /*
MutatingWebhookConfiguration that wires kube-apiserver to this webhook for Pod
admission.

caBundle is intentionally OMITTED from this template. The webhook pod's
in-process cert reconciler (src/webhook_cert.py) injects the real CA bundle
via replace_mutating_webhook_configuration on startup and on drift. Because
this template never emits caBundle, no GitOps engine (ArgoCD SSA, Flux,
kubectl apply --server-side) ever owns the field — the reconciler's value
persists through every sync without a fail-open window (ROADMAP #58). The
older approach rendered `caBundle: ""`, which let argocd-controller own the
field and zero it on every sync, reopening a brief fail-open gap each time.

If you supply a pre-existing CA bundle via webhook.caBundle (e.g. an external
PKI / cert-manager ca-injector), it is emitted here and the in-process
reconciler must be configured not to overwrite it.

Failure mode: with failurePolicy: Ignore, an outage of this webhook does not
block pod admission anywhere in the cluster — pods admit with whatever
resources their chart rendered. Keeps a buggy webhook from being a
cluster-scope incident.

Bootstrap safety:
  - namespaceSelector excludes the webhook's own namespace so the webhook's
    pods can be admitted before the webhook is healthy (chicken-and-egg).
  - kube-system is also excluded by the values default, since system pods
    often must admit successfully even when the webhook is misconfigured.
*/}}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "kube-resource-updater.webhook.fullname" . }}
  labels: {{- include "kube-resource-updater.webhook.labels" . | nindent 4 }}
webhooks:
  - name: pods.kube-resource-updater.io
    admissionReviewVersions: ["v1"]
    sideEffects: {{ .Values.webhook.sideEffects }}
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    timeoutSeconds: {{ .Values.webhook.timeoutSeconds }}
    reinvocationPolicy: Never
    matchPolicy: Equivalent
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
        scope: "Namespaced"
    namespaceSelector:
      matchExpressions:
        # Always exclude the webhook's own namespace to avoid bootstrap deadlocks.
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{ .Release.Namespace }}
        {{- with .Values.webhook.namespaceSelector.matchExpressions }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.webhook.namespaceSelector.matchLabels }}
        # matchLabels merged into matchExpressions to keep a single list — the API
        # accepts both, but mixing them here keeps the rendered manifest minimal.
        {{- range $k, $v := . }}
        - key: {{ $k }}
          operator: In
          values: [{{ $v | quote }}]
        {{- end }}
        {{- end }}
    {{- with .Values.webhook.objectSelector }}
    objectSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    clientConfig:
      {{- if .Values.webhook.caBundle }}
      caBundle: {{ .Values.webhook.caBundle | quote }}
      {{- end }}
      service:
        name: {{ include "kube-resource-updater.webhook.fullname" . }}
        namespace: {{ .Release.Namespace }}
        port: 443
        path: /mutate-pod
{{- end }}
