{{- /*
Token Secret. Two inline-token variants:
  1. git.token set (new, provider-agnostic path) — renders Secret named <fullname>-git.
     Ignored when git.existingSecret is set (operator manages the Secret externally).
  2. gitlab.token set (legacy path) — renders Secret named <fullname>-gitlab.
     Ignored when gitlab.existingSecret is set.

When an existingSecret is configured, the operator supplies the Secret; the chart
renders nothing (no duplicate). validate.yaml fails the render when both .token
and .existingSecret are set in the same stanza (ambiguity prevention).
*/}}
{{- if and (not .Values.git.existingSecret) .Values.git.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-git" (include "kube-resource-updater.fullname" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "kube-resource-updater.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.git.token | quote }}
{{- else if and (not .Values.gitlab.existingSecret) .Values.gitlab.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-gitlab" (include "kube-resource-updater.fullname" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "kube-resource-updater.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.gitlab.token | quote }}
{{- end }}
