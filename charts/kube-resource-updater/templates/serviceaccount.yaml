{{- /* CronJob ServiceAccount; webhook uses its own SA at templates/webhook/serviceaccount.yaml. */ -}}
{{- if and .Values.serviceAccount.create .Values.cronjob.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-resource-updater.serviceAccountName" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "kube-resource-updater.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
