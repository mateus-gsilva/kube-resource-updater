{{- /* Bound only when the CronJob is deployed; webhook has its own binding. */ -}}
{{- if and .Values.rbac.create .Values.cronjob.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-resource-updater.fullname" . }}
  labels:
    {{- include "kube-resource-updater.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-resource-updater.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-resource-updater.serviceAccountName" . }}
    namespace: {{ .Release.Namespace | quote }}
{{- end }}
